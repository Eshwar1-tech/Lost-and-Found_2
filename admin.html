<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-6 bg-gray-100">

<h2 class="text-xl font-bold mb-4 text-center">🛠 Admin Panel</h2>

<div id="data" class="grid gap-4"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAv6e14kxuK5PtbLNvP9HEvWDMHOVWjrWg",
  authDomain: "lost-found-system-732ba.firebaseapp.com",
  projectId: "lost-found-system-732ba"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const ADMIN_EMAIL = "admin@gmail.com";

const div = document.getElementById("data");

// 🔐 AUTH CHECK (IMPROVED)
onAuthStateChanged(auth, (user) => {

  if (!user) {
    window.location.replace("index.html");
    return;
  }

  // 🔥 trim + lowercase fix
  const email = user.email.trim().toLowerCase();

  if (email !== ADMIN_EMAIL.toLowerCase()) {
    alert("Access denied! Admin only.");
    window.location.replace("dashboard.html");
    return;
  }

  // ✅ Admin verified
  loadData();
});


// 🔥 LOAD DATA
function loadData() {

  onSnapshot(collection(db, "foundItems"), snap => {

    div.innerHTML = "";

    if (snap.empty) {
      div.innerHTML = `<p class="text-center text-gray-500">No items found</p>`;
      return;
    }

    snap.forEach(d => {
      const data = d.data();

      const card = document.createElement("div");
      card.className = "bg-white p-4 rounded-xl shadow";

      card.innerHTML = `
        <h3 class="font-bold text-lg text-blue-900">${data.itemName || "No Name"}</h3>

        <p><b>📍 Location:</b> ${data.location || "N/A"}</p>
        <p><b>👤 Name:</b> ${data.name || "N/A"}</p>
        <p><b>📞 Phone:</b> ${data.phno || "N/A"}</p>

        ${
          data.image && data.image.startsWith("http")
          ? `
          <div class="mt-3">
            <p class="font-semibold">📸 Item Image:</p>
            <img src="${data.image}" class="w-full h-40 object-cover rounded mt-1">
          </div>
          `
          : `<p class="text-gray-400 mt-2">No image available</p>`
        }
      `;

      div.appendChild(card);
    });

  });

}
</script>

</body>
</html>
