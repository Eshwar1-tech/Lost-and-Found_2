<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>View Items</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen p-6">

<h2 class="text-2xl font-bold mb-6 text-blue-900 text-center">
📋 Found Items
</h2>

<div id="container" class="grid gap-4"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs, initializeFirestore } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAv6e14kxuK5PtbLNvP9HEvWDMHOVWjrWg",
  authDomain: "lost-found-system-732ba.firebaseapp.com",
  projectId: "lost-found-system-732ba"
};

// ✅ Init
const app = initializeApp(firebaseConfig);

const db = initializeFirestore(app, {
  experimentalForceLongPolling: true
});

const container = document.getElementById("container");

// 🔥 LOAD DATA FUNCTION
async function loadItems() {
  try {
    console.log("Fetching data...");

    const snapshot = await getDocs(collection(db, "foundItems"));

    console.log("Docs count:", snapshot.size);

    container.innerHTML = "";

    // ❗ If no data
    if (snapshot.empty) {
      container.innerHTML = `
        <p class="text-center text-gray-500">No items found</p>
      `;
      return;
    }

    // ✅ Loop documents
    snapshot.forEach((doc) => {
      const data = doc.data();

      const card = document.createElement("div");
      card.className = "bg-white p-5 rounded-xl shadow";

      card.innerHTML = `
        <h3 class="text-lg font-bold text-blue-900">${data.itemName || "No Name"}</h3>
        <p><b>📍 Location:</b> ${data.location ? data.location.trim() : "N/A"}</p>
        <p><b>📅 Date:</b> ${data.date || "N/A"}</p>
        <p><b>🔖 Model:</b> ${data.model || "N/A"}</p>

        <button class="mt-3 w-full bg-green-600 text-white py-2 rounded claimBtn">
          🔐 Claim Item
        </button>
      `;

      // ✅ ADD CLICK FUNCTION
      const claimBtn = card.querySelector(".claimBtn");

      claimBtn.onclick = () => {
        localStorage.setItem("claimItemId", doc.id);
        window.location.href = "claim.html";
      };

      container.appendChild(card);
    });

  } catch (error) {
    console.error("🔥 ERROR:", error);

    container.innerHTML = `
      <p class="text-center text-red-500">Error loading data</p>
    `;

    alert("Error: " + error.message);
  }
}

// 🚀 RUN
loadItems();
</script>

</body>
</html>
